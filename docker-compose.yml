services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jasper
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: orbital
    ports:
      - "5432:5432"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://jasper:secret@db:5432/orbital
